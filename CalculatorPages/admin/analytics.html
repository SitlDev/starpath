<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | YourCalc Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <nav class="sidebar">
        <h2>YourCalc Admin</h2>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="">📊 Overview</a></li>
            <li><a href="analytics.html" class="active">👥 Analytics</a></li>
            <li><a href="seo.html" class="">🔍 SEO</a></li>
            <li><a href="adsense.html" class="">💰 AdSense</a></li>
            <li><a href="calculators.html" class="">🧮 Calculators</a></li>
            <li><a href="leads.html" class="">📧 Leads</a></li>
            <li style="margin-top: 32px;"><a href="../index.html">← Back to Site</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <div class="topbar">
            <h1>Analytics</h1>
            <div style="display: flex; gap: 16px;">
                <select class="date-selector">
                    <option>Last 7 Days</option>
                    <option selected>Last 30 Days</option>
                    <option>Last 90 Days</option>
                    <option>Custom Range</option>
                </select>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="grid-3">
            <div class="card">
                <h3 class="card-title">Traffic Sources</h3>
                <canvas id="sourceChart" height="200"></canvas>
            </div>
            <div class="card">
                <h3 class="card-title">Top Performance Pages</h3>
                <table class="table">
                    <thead><tr><th>Page</th><th>Views</th></tr></thead>
                    <tbody id="top-pages-body"></tbody>
                </table>
            </div>
            <div class="card">
                <h3 class="card-title">Real-time Acquisition</h3>
                <div id="acquisition-list" style="font-size: 13px; color: var(--muted);"></div>
            </div>
        </div>
        <script>
            async function loadAnalytics() {
                const SECRET = 'h14sua12';
                try {
                    const res = await fetch(`/api/admin?action=get-leads&secret=${SECRET}`);
                    const data = await res.json();
                    const { referrers, topPages } = data.stats;

                    // 1. Source Chart
                    new Chart(document.getElementById('sourceChart'), { 
                        type: 'doughnut', 
                        data: { 
                            labels: referrers.map(r => r.referrer || 'Direct'), 
                            datasets: [{ data: referrers.map(r => r.count), backgroundColor: ['#4f46e5', '#3ecf8e', '#f5a623', '#ef4444', '#64748b'], borderWidth: 0 }] 
                        }, 
                        options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#a0a0ab', font: { size: 10 } } } } } 
                    });

                    // 2. Top Pages
                    document.getElementById('top-pages-body').innerHTML = topPages.map(p => `
                        <tr>
                            <td style="font-size: 11px;">${p.url.split('/').pop() || 'Home'}</td>
                            <td>${p.count}</td>
                        </tr>
                    `).join('');

                } catch (err) {
                    console.error("Analytics Error:", err);
                }
            }
            document.addEventListener('DOMContentLoaded', loadAnalytics);
        </script>

    </main>
    <script src="admin.js"></script>
</body>
</html>
