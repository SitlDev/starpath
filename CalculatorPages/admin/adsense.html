<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AdSense Performance | YourCalc Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <nav class="sidebar">
        <h2>YourCalc Admin</h2>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="">📊 Overview</a></li>
            <li><a href="analytics.html" class="">👥 Analytics</a></li>
            <li><a href="seo.html" class="">🔍 SEO</a></li>
            <li><a href="adsense.html" class="active">💰 AdSense</a></li>
            <li><a href="calculators.html" class="">🧮 Calculators</a></li>
            <li><a href="leads.html" class="">📧 Leads</a></li>
            <li style="margin-top: 32px;"><a href="../index.html">← Back to Site</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <div class="topbar">
            <h1>AdSense Performance</h1>
            <div style="display: flex; gap: 16px;">
                <select class="date-selector">
                    <option>Last 7 Days</option>
                    <option selected>Last 30 Days</option>
                    <option>Last 90 Days</option>
                    <option>Custom Range</option>
                </select>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="grid-kpi">
            <div class="card"><div class="card-title">Est. Earnings (Live)</div><div class="card-value" id="est-earnings">$0.00</div></div>
            <div class="card"><div class="card-title">Projected RPM</div><div class="card-value" id="avg-rpm">$0.00</div></div>
            <div class="card"><div class="card-title">Total Pageviews</div><div class="card-value" id="total-views">0</div></div>
            <div class="card"><div class="card-title">Monetization Score</div><div class="card-value" id="mon-score">0%</div></div>
        </div>
        <div class="card" style="margin-bottom: 24px;">
            <h3 class="card-title">Estimated Revenue by Category</h3>
            <table class="table">
                <thead>
                    <tr><th>Category</th><th>Views</th><th>Est. RPM</th><th>Est. Earnings</th></tr>
                </thead>
                <tbody id="adsense-body">
                    <!-- Dynamic Data -->
                </tbody>
            </table>
        </div>

    </main>

    <script>
        const RPMS = {
            'High Value (Finance)': 22.50,
            'Medium Value (Health)': 14.80,
            'Academic (Low RPM)': 1.50,
            'General': 9.20
        };

        async function loadAdSenseData() {
            const SECRET = 'h14sua12';
            try {
                const res = await fetch(`/api/admin?action=get-leads&secret=${SECRET}`);
                const data = await res.json();
                const { categoryPerformance, totals } = data.stats;

                let totalEarnings = 0;
                let totalViews = 0;

                const body = document.getElementById('adsense-body');
                body.innerHTML = categoryPerformance.map(c => {
                    const rpm = RPMS[c.category] || 10.00;
                    const earnings = (c.views / 1000) * rpm;
                    totalEarnings += earnings;
                    totalViews += parseInt(c.views);

                    return `
                        <tr>
                            <td><strong>${c.category}</strong></td>
                            <td>${parseInt(c.views).toLocaleString()}</td>
                            <td><span class="badge ${rpm > 15 ? 'green' : (rpm < 5 ? 'red' : '')}">$${rpm.toFixed(2)}</span></td>
                            <td style="font-weight:700; color:var(--accent);">$${earnings.toFixed(2)}</td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('est-earnings').innerText = `$${totalEarnings.toFixed(2)}`;
                document.getElementById('total-views').innerText = totalViews.toLocaleString();
                document.getElementById('avg-rpm').innerText = `$${((totalEarnings / totalViews) * 1000).toFixed(2)}`;
                
                const score = Math.min(100, (totalEarnings / (totalViews * 0.02)) * 100);
                document.getElementById('mon-score').innerText = `${score.toFixed(0)}%`;

            } catch (err) {
                console.error("AdSense Load Error:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', loadAdSenseData);
    </script>
    <script src="admin.js"></script>
</body>
</html>
