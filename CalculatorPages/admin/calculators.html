<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Insights | YourCalc Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <nav class="sidebar">
        <h2>YourCalc Admin</h2>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="">📊 Overview</a></li>
            <li><a href="analytics.html" class="">👥 Analytics</a></li>
            <li><a href="seo.html" class="">🔍 SEO</a></li>
            <li><a href="adsense.html" class="">💰 AdSense</a></li>
            <li><a href="calculators.html" class="active">🧮 Calculators</a></li>
            <li><a href="leads.html" class="">📧 Leads</a></li>
            <li style="margin-top: 32px;"><a href="../index.html">← Back to Site</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <div class="topbar">
            <h1>Calculator Insights</h1>
            <div style="display: flex; gap: 16px;">
                <select class="date-selector">
                    <option>Last 7 Days</option>
                    <option selected>Last 30 Days</option>
                    <option>Last 90 Days</option>
                    <option>Custom Range</option>
                </select>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="card" style="margin-bottom: 24px;">
            <h3 class="card-title">Calculator Usage Leaderboard</h3>
            <table class="table">
                <thead>
                    <tr><th>Calculator</th><th>Views</th><th>Leads</th><th>Conversion %</th></tr>
                </thead>
                <tbody id="calc-leaderboard-body">
                    <!-- Dynamic Data -->
                </tbody>
            </table>
        </div>

    </main>

    <script>
        async function loadCalcInsights() {
            const SECRET = 'h14sua12';
            try {
                const res = await fetch(`/api/admin?action=get-leads&secret=${SECRET}`);
                const data = await res.json();
                const { toolPerformance } = data.stats;

                const body = document.getElementById('calc-leaderboard-body');
                body.innerHTML = toolPerformance.map(t => `
                    <tr>
                        <td style="font-weight:600;">${t.tool}</td>
                        <td>${t.views.toLocaleString()}</td>
                        <td>${t.leads.toLocaleString()}</td>
                        <td style="color: ${t.conversion_rate > 10 ? '#3ecf8e' : '#6b7280'}; font-weight:700;">
                            ${t.conversion_rate}%
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Failed to load calculator insights:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', loadCalcInsights);
    </script>
    <script src="admin.js"></script>
</body>
</html>
