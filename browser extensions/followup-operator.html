<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FollowUp Operator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: #1a1a1a;
      --accent-primary: #00ff41;
      --accent-secondary: #00cc34;
      --accent-danger: #ff3366;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --text-tertiary: #444444;
      --border: #222222;
      --shadow: rgba(0, 255, 65, 0.1);
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' /%3E%3C/svg%3E");
      z-index: 9999;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      margin-bottom: 60px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 40px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px var(--shadow)); }
      50% { filter: drop-shadow(0 0 16px var(--shadow)); }
    }

    .tagline {
      font-size: 14px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .status-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      padding: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .stat {
      flex: 1;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .priority-section {
      margin-bottom: 60px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .btn {
      padding: 12px 24px;
      background: var(--bg-card);
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 4px;
    }

    .btn:hover {
      background: var(--accent-primary);
      color: var(--bg-primary);
      box-shadow: 0 0 20px var(--shadow);
    }

    .btn-primary {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
    }

    .btn-primary:hover {
      background: var(--accent-secondary);
      border-color: var(--accent-secondary);
    }

    .btn-danger {
      border-color: var(--accent-danger);
      color: var(--accent-danger);
    }

    .btn-danger:hover {
      background: var(--accent-danger);
      color: white;
    }

    .lead-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .lead-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent-primary);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.3s ease;
    }

    .lead-card:hover::before {
      transform: scaleY(1);
    }

    .lead-card:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 8px 32px var(--shadow);
      transform: translateX(4px);
    }

    .lead-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .lead-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .lead-email {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .urgency-badge {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .urgency-high {
      background: rgba(255, 51, 102, 0.2);
      color: var(--accent-danger);
      border: 1px solid var(--accent-danger);
    }

    .urgency-medium {
      background: rgba(255, 200, 0, 0.2);
      color: #ffc800;
      border: 1px solid #ffc800;
    }

    .urgency-low {
      background: rgba(0, 255, 65, 0.2);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
    }

    .lead-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: 4px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 14px;
      color: var(--text-primary);
    }

    .lead-actions {
      display: flex;
      gap: 12px;
    }

    .lead-actions .btn {
      flex: 1;
      padding: 10px 16px;
      font-size: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease-out;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--accent-primary);
      border-radius: 8px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 255, 65, 0.2);
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--accent-primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px var(--shadow);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    .tab:hover {
      color: var(--text-primary);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }

      .status-bar {
        flex-direction: column;
      }

      .lead-details {
        grid-template-columns: 1fr;
      }

      .lead-actions {
        flex-direction: column;
      }

      .modal {
        padding: 24px;
      }
    }

    .scan-animation {
      position: relative;
      overflow: hidden;
    }

    .scan-animation::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.1), transparent);
      animation: scan 2s infinite;
    }

    @keyframes scan {
      0% { left: -100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Storage utilities
    const storage = {
      async get(key) {
        try {
          const result = await window.storage.get(key);
          return result ? JSON.parse(result.value) : null;
        } catch {
          return null;
        }
      },
      async set(key, value) {
        try {
          await window.storage.set(key, JSON.stringify(value));
          return true;
        } catch {
          return false;
        }
      },
      async list(prefix) {
        try {
          const result = await window.storage.list(prefix);
          return result ? result.keys : [];
        } catch {
          return [];
        }
      }
    };

    function App() {
      const [leads, setLeads] = useState([]);
      const [showAddModal, setShowAddModal] = useState(false);
      const [activeTab, setActiveTab] = useState('today');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadLeads();
      }, []);

      const loadLeads = async () => {
        try {
          const keys = await storage.list('lead:');
          const loadedLeads = [];
          
          for (const key of keys) {
            const lead = await storage.get(key);
            if (lead) loadedLeads.push(lead);
          }
          
          setLeads(loadedLeads.sort((a, b) => b.priority - a.priority));
        } catch (error) {
          console.error('Failed to load leads:', error);
        } finally {
          setLoading(false);
        }
      };

      const addLead = async (leadData) => {
        const newLead = {
          id: Date.now().toString(),
          ...leadData,
          createdAt: new Date().toISOString(),
          lastContact: leadData.lastContact || new Date().toISOString(),
          status: 'active',
          followUpCount: 0
        };

        await storage.set(`lead:${newLead.id}`, newLead);
        setLeads([...leads, newLead].sort((a, b) => b.priority - a.priority));
        setShowAddModal(false);
      };

      const updateLeadStatus = async (leadId, status) => {
        const updatedLeads = leads.map(lead => {
          if (lead.id === leadId) {
            const updated = { ...lead, status, updatedAt: new Date().toISOString() };
            storage.set(`lead:${leadId}`, updated);
            return updated;
          }
          return lead;
        });
        setLeads(updatedLeads);
      };

      const sendFollowUp = async (leadId) => {
        const updatedLeads = leads.map(lead => {
          if (lead.id === leadId) {
            const updated = {
              ...lead,
              followUpCount: lead.followUpCount + 1,
              lastContact: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            };
            storage.set(`lead:${leadId}`, updated);
            return updated;
          }
          return lead;
        });
        setLeads(updatedLeads);
      };

      const deleteLead = async (leadId) => {
        setLeads(leads.filter(lead => lead.id !== leadId));
        // Note: In a real implementation, you'd delete from storage here
      };

      const getUrgency = (lead) => {
        const daysSinceContact = Math.floor(
          (new Date() - new Date(lead.lastContact)) / (1000 * 60 * 60 * 24)
        );
        
        if (daysSinceContact >= lead.followUpDays * 2) return 'high';
        if (daysSinceContact >= lead.followUpDays) return 'medium';
        return 'low';
      };

      const filterLeads = () => {
        const now = new Date();
        
        switch(activeTab) {
          case 'today':
            return leads.filter(lead => {
              if (lead.status !== 'active') return false;
              const daysSince = Math.floor(
                (now - new Date(lead.lastContact)) / (1000 * 60 * 60 * 24)
              );
              return daysSince >= lead.followUpDays;
            });
          case 'active':
            return leads.filter(lead => lead.status === 'active');
          case 'closed':
            return leads.filter(lead => lead.status !== 'active');
          default:
            return leads;
        }
      };

      const stats = {
        active: leads.filter(l => l.status === 'active').length,
        needsFollowUp: filterLeads().length,
        totalContacts: leads.reduce((sum, l) => sum + l.followUpCount, 0)
      };

      if (loading) {
        return (
          <div className="app">
            <div className="empty-state scan-animation">
              <div className="empty-state-icon">⚡</div>
              <p>Loading your pipeline...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="app">
          <header>
            <h1>FollowUp Operator</h1>
            <p className="tagline">No warm lead forgotten</p>
          </header>

          <div className="status-bar">
            <div className="stat">
              <div className="stat-label">Active Leads</div>
              <div className="stat-value">{stats.active}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Need Follow-Up</div>
              <div className="stat-value">{stats.needsFollowUp}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Total Contacts</div>
              <div className="stat-value">{stats.totalContacts}</div>
            </div>
          </div>

          <div className="tabs">
            <button 
              className={`tab ${activeTab === 'today' ? 'active' : ''}`}
              onClick={() => setActiveTab('today')}
            >
              Action Required ({filterLeads().length})
            </button>
            <button 
              className={`tab ${activeTab === 'active' ? 'active' : ''}`}
              onClick={() => setActiveTab('active')}
            >
              All Active
            </button>
            <button 
              className={`tab ${activeTab === 'closed' ? 'active' : ''}`}
              onClick={() => setActiveTab('closed')}
            >
              Closed
            </button>
          </div>

          <div className="priority-section">
            <div className="section-header">
              <h2>Pipeline</h2>
              <button className="btn btn-primary" onClick={() => setShowAddModal(true)}>
                + Add Lead
              </button>
            </div>

            {filterLeads().length === 0 ? (
              <div className="empty-state">
                <div className="empty-state-icon">✓</div>
                <p>
                  {activeTab === 'today' 
                    ? "You're all caught up! No leads need attention right now." 
                    : "No leads in this view."}
                </p>
              </div>
            ) : (
              filterLeads().map(lead => (
                <LeadCard
                  key={lead.id}
                  lead={lead}
                  urgency={getUrgency(lead)}
                  onFollowUp={sendFollowUp}
                  onStatusChange={updateLeadStatus}
                  onDelete={deleteLead}
                />
              ))
            )}
          </div>

          {showAddModal && (
            <AddLeadModal
              onClose={() => setShowAddModal(false)}
              onAdd={addLead}
            />
          )}
        </div>
      );
    }

    function LeadCard({ lead, urgency, onFollowUp, onStatusChange, onDelete }) {
      const daysSinceContact = Math.floor(
        (new Date() - new Date(lead.lastContact)) / (1000 * 60 * 60 * 24)
      );

      return (
        <div className="lead-card">
          <div className="lead-header">
            <div>
              <div className="lead-name">{lead.name}</div>
              <div className="lead-email">{lead.email}</div>
            </div>
            <div className={`urgency-badge urgency-${urgency}`}>
              {urgency} priority
            </div>
          </div>

          <div className="lead-details">
            <div className="detail-item">
              <div className="detail-label">Last Contact</div>
              <div className="detail-value">{daysSinceContact} days ago</div>
            </div>
            <div className="detail-item">
              <div className="detail-label">Follow-Ups Sent</div>
              <div className="detail-value">{lead.followUpCount}</div>
            </div>
            <div className="detail-item">
              <div className="detail-label">Company</div>
              <div className="detail-value">{lead.company || 'N/A'}</div>
            </div>
          </div>

          {lead.notes && (
            <div style={{ 
              padding: '12px', 
              background: 'var(--bg-secondary)', 
              borderRadius: '4px', 
              fontSize: '13px',
              marginBottom: '16px',
              color: 'var(--text-secondary)'
            }}>
              {lead.notes}
            </div>
          )}

          <div className="lead-actions">
            {lead.status === 'active' && (
              <>
                <button 
                  className="btn btn-primary" 
                  onClick={() => onFollowUp(lead.id)}
                >
                  Send Follow-Up
                </button>
                <button 
                  className="btn" 
                  onClick={() => onStatusChange(lead.id, 'responded')}
                >
                  Mark Responded
                </button>
                <button 
                  className="btn btn-danger" 
                  onClick={() => onStatusChange(lead.id, 'dead')}
                >
                  Mark Dead
                </button>
              </>
            )}
            {lead.status !== 'active' && (
              <button 
                className="btn" 
                onClick={() => onStatusChange(lead.id, 'active')}
              >
                Reactivate
              </button>
            )}
          </div>
        </div>
      );
    }

    function AddLeadModal({ onClose, onAdd }) {
      const [formData, setFormData] = useState({
        name: '',
        email: '',
        company: '',
        notes: '',
        followUpDays: 3,
        priority: 5
      });

      const handleSubmit = (e) => {
        e.preventDefault();
        if (formData.name && formData.email) {
          onAdd(formData);
        }
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Add New Lead</h3>
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label>Name *</label>
                <input
                  type="text"
                  value={formData.name}
                  onChange={e => setFormData({...formData, name: e.target.value})}
                  required
                  placeholder="John Doe"
                />
              </div>

              <div className="form-group">
                <label>Email *</label>
                <input
                  type="email"
                  value={formData.email}
                  onChange={e => setFormData({...formData, email: e.target.value})}
                  required
                  placeholder="john@company.com"
                />
              </div>

              <div className="form-group">
                <label>Company</label>
                <input
                  type="text"
                  value={formData.company}
                  onChange={e => setFormData({...formData, company: e.target.value})}
                  placeholder="Acme Corp"
                />
              </div>

              <div className="form-group">
                <label>Follow-Up Interval (days)</label>
                <select
                  value={formData.followUpDays}
                  onChange={e => setFormData({...formData, followUpDays: parseInt(e.target.value)})}
                >
                  <option value="1">1 day</option>
                  <option value="2">2 days</option>
                  <option value="3">3 days</option>
                  <option value="5">5 days</option>
                  <option value="7">7 days</option>
                </select>
              </div>

              <div className="form-group">
                <label>Priority (1-10)</label>
                <input
                  type="number"
                  min="1"
                  max="10"
                  value={formData.priority}
                  onChange={e => setFormData({...formData, priority: parseInt(e.target.value)})}
                />
              </div>

              <div className="form-group">
                <label>Notes</label>
                <textarea
                  value={formData.notes}
                  onChange={e => setFormData({...formData, notes: e.target.value})}
                  placeholder="Context about this lead..."
                />
              </div>

              <div className="modal-actions">
                <button type="submit" className="btn btn-primary">
                  Add Lead
                </button>
                <button type="button" className="btn" onClick={onClose}>
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
